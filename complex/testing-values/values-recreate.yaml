global:
  container:
    image:
      repository: cookielab/deployer
      tag: 1.0.0-rc2

components:
  api:
    type: http
    replicas: 1
    strategyType: Recreate
    ports:
      - port: 3000
    probes:
      readinessProbe:
        httpGet:
          port: 8080
          path: /health-check
        periodSeconds: 30
        timeoutSeconds: 15
      livenessProbe:
        httpGet:
          port: 8080
          path: /health-check
    targetGroup:
      arn: 'arn:fake'
      securityGroupIds:
        - sg-fake
  worker:
    type: consumer
    strategyType: Recreate
    command:
      - bin/consume
  rolling-worker:
    type: consumer
    strategyType: RollingUpdate
    command:
      - bin/consume
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
